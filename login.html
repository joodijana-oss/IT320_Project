<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanad — Log In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="sn-nav">
  <div class="sn-container">
    <div class="sn-nav__inner">
      <a href="index.html" class="sn-nav__logo">
        <img class="sn-nav__logo-img" src="images/slogo.png" alt="Sanad logo">
        <span class="sn-nav__logo-name">Sanad</span>
      </a>
    </div>
  </div>
</nav>

<!-- ── Main ───────────────────────────────────────────────── -->
<main class="sn-main login-page">
  <div class="sn-container">
    <div class="login-box">

      <!-- Brand above card -->
      <div class="login-brand">
        <div class="login-brand__logo">
          <img src="images/slogo.png" alt="Sanad logo" class="login-brand__logo-img">
          <span class="login-brand__logo-name">Sanad</span>
        </div>
        <p class="login-brand__tagline">Connecting patients with pharmacies across Riyadh</p>
      </div>

      <!-- Card -->
      <div class="login-card">
        <div id="success-box" class="success-box" style="display:none;"></div>
        <h1 class="login-card__title">Welcome back</h1>
        <p class="login-card__subtitle">Sign in to your account to continue</p>


        <form id="login-form" novalidate>

          <div class="login-field">
            <label for="login-role">Sign in as</label>
            <select id="login-role" name="role">
              <option value="">Select role</option>
              <option value="patient">Patient</option>
              <option value="pharmacy">Pharmacy</option>
              <option value="admin">Admin</option>
            </select>
            <span id="login-role-error" style="display:none; font-size:12px; color:#8b2020; margin-top:4px;">Please select your role.</span>
          </div>

          <div class="login-field">
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email">
            <span id="login-email-error" style="display:none; font-size:12px; color:#8b2020; margin-top:4px;">Please enter a valid email address.</span>
          </div>

          <div class="login-field">
            <label for="login-password">Password</label>
            <div class="login-pw-wrap">
              <input type="password" id="login-password" name="password" placeholder="Your password" autocomplete="current-password">
              <button type="button" id="login-pw-toggle" aria-label="Toggle password visibility">
                <svg id="icon-eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="icon-eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span id="login-password-error" style="display:none; font-size:12px; color:#8b2020; margin-top:4px;">Password is required.</span>
          </div>

          <button type="submit" id="login-submit-btn" class="login-submit-btn">
            <span class="login-btn-spinner"></span>
            <span class="login-btn-text">Sign in</span>
          </button>

        </form>

        <p class="login-register-link">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>

    </div>
  </div>
</main>

<!-- ── Footer ─────────────────────────────────────────────── -->

<!-- ── Footer ── -->
<footer class="sn-footer">
  <div class="sn-container">
    <div class="sn-footer__inner">
        <span class="sn-footer__logo-name">Sanad</span>
      <span class="sn-footer__copy">© 2026 Sanad. Riyadh, Saudi Arabia.</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>

</body>
</html>
