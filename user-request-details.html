<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="sn-nav">
    <div class="sn-container sn-nav__inner">
      <a href="index.html" class="sn-nav__logo">
        <img src="images/slogo.png" alt="Sanad Logo" class="sn-nav__logo-img" />
        <span class="sn-nav__logo-name">Sanad</span>
      </a>

      <ul class="sn-nav__links">
        <li><a href="user-dashboard.html">Dashboard</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="submit-request.html">Submit Request</a></li>
        <li><a href="my-requests.html" class="sn-nav--active">My Requests</a></li>
        <li><a href="index.html" class="sn-nav--logout">Log out</a></li>
      </ul>
    </div>
  </header>

  <main class="sn-main submit-request-page">
    <div class="sn-container">
      <a href="my-requests.html" class="sn-back">← Back to My Requests</a>

    <!-- HEADER -->
    <section class="admin-page-head admin-page-head--small">
      <span class="admin-page-head__badge">Request Details</span>
      <h1 class="admin-page-head__title">Request #1001</h1>
    </section>

    <!-- CARD -->
    <form id="editRequestForm" class="submit-card">

      <div class="form-grid">

        <div class="form-field">
            <label>Medication Name</label>
          
            <div class="input-box">
              <input type="text" id="medication" value="Augmentin 625mg" readonly required>
              <span class="edit-icon" onclick="enableEdit(this)">✏️</span>
            </div>
          
          </div>

          <div class="form-field">
            <label>Priority</label>
          
            <div class="input-box">
              <select id="priority" disabled required>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
              </select>
              <span class="edit-icon" onclick="enableEdit(this)">✏️</span>
            </div>
          
          </div>

          <div class="form-field">
            <label>City</label>
            <input type="text" value="Riyadh" disabled>
          </div>

          <div class="form-field">
            <label>Zone</label>
          
            <div class="input-box">
              <select id="zone" disabled required>
                <option>North Riyadh</option>
                <option>South Riyadh</option>
                <option>East Riyadh</option>
                <option>West Riyadh</option>
              </select>
              <span class="edit-icon" onclick="enableEdit(this)">✏️</span>
            </div>
          
          </div>

        <div class="form-field">
          <label>Status</label>
          <input type="text" value="Pending" disabled>
        </div>

        <div class="form-field form-full">
            <label>Notes</label>
          
            <div class="input-box">
              <textarea id="notes" readonly required>Urgent request</textarea>
              <span class="edit-icon" onclick="enableEdit(this)">✏️</span>
            </div>
          
          </div>

          <div class="form-field form-full">
            <label>Prescription</label>
          
            <div class="prescription-box">
              
              
              <img id="previewImage" src="images/prescription.png" alt="Prescription">
          
              
              <input type="file" id="file" accept="image/*">
          
            </div>
          </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions-row">

        <button type="button" class="admin-btn admin-btn--danger" onclick="deleteRequest()">
          Delete
        </button>

        <button type="submit" class="admin-btn admin-btn--primary">
          Save Changes
        </button>

        <a href="patient-offers.html" class="admin-btn admin-btn--secondary">
            View Offers
          </a>

      </div>

    </form>

  </div>
</main>

<!-- ── Footer ── -->
<footer class="sn-footer">
    <div class="sn-container">
      <div class="sn-footer__inner">
          <span class="sn-footer__logo-name">Sanad</span>
        <span class="sn-footer__copy">© 2026 Sanad. Riyadh, Saudi Arabia.</span>
      </div>
    </div>
  </footer>

  <script src="valdiation.js"></script>
</body>
</html>
